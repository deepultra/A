<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026世界杯分组、积分榜与晋级路线图</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="page-header">
        <h1>2026年世界杯</h1>
        <p>分组、积分榜与晋级路线图</p>
    </header>

    <div class="container">
        <p>点击球队国旗进行选择，然后点击“更新路线图”按钮。</p>

        <!-- 分组信息区域 -->
        <div id="groups-section">
            <h2>分组信息与积分榜</h2>
            <div id="groups-container">
                <!-- 分组表格和积分榜将由 JavaScript 动态生成 -->
            </div>
        </div>

        <!-- 晋级路线图区域 -->
        <div id="bracket-section">
            <h2>晋级路线图</h2>
            <div id="bracket-container">
                <!-- 路线图将由 JavaScript 动态生成 -->
            </div>
            <button id="update-bracket-btn">更新路线图</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
